name: 🚀 Deploy Music Discord Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_DIR: /var/www/music_discord

jobs:
  build:
    name: 🏗️ Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: ✅ Validate Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r bot/requirements.txt
          echo "✅ Python dependencies validated"

      - name: ✅ Validate Node dependencies
        run: |
          npm ci
          echo "✅ Node dependencies validated"

      - name: 🎨 Build frontend
        run: |
          npm run build
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          echo "✅ Frontend build successful"

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📤 Pull & Deploy on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            echo "🚀 Starting deployment..."
            cd ${{ env.PROJECT_DIR }}
            git config --global --add safe.directory ${{ env.PROJECT_DIR }}
            echo "📥 Pulling latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main
            echo "🐍 Updating Python dependencies..."
            cd bot
            source venv/bin/activate
            pip install --upgrade pip setuptools wheel -q
            pip install -r requirements.txt -q
            echo "✅ Python dependencies updated"
            echo "📦 Updating Node dependencies..."
            cd /var/www/music_discord
            npm ci 2>/dev/null || npm install
            echo "✅ Node dependencies updated"
            echo "🎨 Building frontend..."
            npm run build || (echo "❌ Build failed" && exit 1)
            if [ ! -d "dist" ]; then
              echo "❌ Build failed: dist directory not found"
              exit 1
            fi
            echo "✅ Frontend built successfully"
            echo "🔐 Setting file permissions..."
            sudo chown -R discord:discord bot
            sudo chown -R www-data:www-data dist
            sudo chmod -R 755 dist
            echo "✅ Permissions set"
            echo " Reloading Nginx..."
            sudo systemctl reload nginx
            echo "✅ Nginx reloaded"
            echo "🔄 Restarting bot service..."
            sudo systemctl restart music-discord-bot.service
            sleep 3
            if sudo systemctl is-active --quiet music-discord-bot.service; then
              echo "✅ Bot service is running"
            else
              echo "❌ Bot service failed to start"
              sudo journalctl -u music-discord-bot.service -n 20 --no-pager
              exit 1
            fi
            echo "🔍 Checking API health..."
            sleep 2
            RETRIES=5
            while [ $RETRIES -gt 0 ]; do
              if curl -sf http://127.0.0.1:8000/bot/status > /dev/null; then
                echo "✅ API is responding"
                break
              fi
              RETRIES=$((RETRIES - 1))
              if [ $RETRIES -gt 0 ]; then
                echo "⏳ Waiting for API... ($RETRIES retries left)"
                sleep 2
              fi
            done
            if [ $RETRIES -eq 0 ]; then
              echo "❌ API health check failed"
              sudo journalctl -u music-discord-bot.service -n 30 --no-pager
              exit 1
            fi
            echo "🔍 Checking frontend..."
            if [ -f "dist/index.html" ]; then
              echo "✅ Frontend files present"
            else
              echo "❌ Frontend files missing"
              exit 1
            fi
            echo ""
            echo "🎉 Deployment completed successfully!"
            echo "📊 Service status:"
            sudo systemctl status music-discord-bot.service --no-pager | head -10
            echo ""
            echo "📋 Recent logs:"
            sudo journalctl -u music-discord-bot.service -n 5 --no-pager

      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Your app is live at: https://music.discord.wlomet.fr"
          echo "📊 View logs: ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'sudo journalctl -u music-discord-bot.service -f'"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details"
          exit 1
